<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Pop! PE Activity</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- TensorFlow.js dependencies (pinned versions for cross-platform stability) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.22.0/dist/tf-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.22.0/dist/tf-converter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.22.0/dist/tf-backend-webgl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-cpu@4.22.0/dist/tf-backend-cpu.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
</head>
<body>
    <div id="game-container">
        <!-- Hidden Video Element for MediaPipe -->
        <video id="video" playsinline style="display: none;"></video>
        
        <!-- Game Canvas for Characters and UI -->
        <canvas id="game-canvas"></canvas>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="overlay active">
            <div class="loader"></div>
            <h2>카메라와 AI 모델을 불러오는 중...</h2>
            <p>잠시만 기다려주세요.</p>
            <button id="retry-init-btn" class="action-btn hidden" style="width: auto; padding: 0.8rem 2rem; margin-top: 1.5rem;">다시 시도</button>
        </div>

        <!-- Start Menu Overlay -->
        <div id="start-menu" class="overlay hidden">
            <h1>NUMBER POP!</h1>
            <div class="menu-box">
                <div class="setting-group">
                    <label>색깔 힌트 (다음 숫자 안내)</label>
                    <div class="toggle-group">
                        <button class="toggle-btn active" id="btn-hint-on" data-hint="on">켜기</button>
                        <button class="toggle-btn" id="btn-hint-off" data-hint="off">끄기</button>
                    </div>
                </div>

                <div class="setting-group">
                    <label>초시계 (타이머)</label>
                    <div class="toggle-group">
                        <button class="toggle-btn active" id="btn-timer-on" data-timer="on">켜기</button>
                        <button class="toggle-btn" id="btn-timer-off" data-timer="off">끄기</button>
                    </div>
                </div>
                
                <div class="setting-group">
                    <label>목표 숫자</label>
                    <input type="number" id="target-number" value="10" min="5" max="50">
                </div>

                <button id="start-btn" class="action-btn">게임 준비</button>
            </div>
            <div class="instructions">
                <p>1. 바닥 선을 밟고 뒤로 물러서세요.</p>
                <p>2. 양손을 모아 박수를 치면 게임이 시작됩니다.</p>
                <p>3. 순서대로 숫자를 터치하세요. 발이 선에서 떨어지면 안 됩니다!</p>
            </div>
        </div>

        <!-- In-Game UI Overlay (Timers, Status) -->
        <div id="in-game-ui" class="hidden">
            <div id="player1-ui" class="player-hud">
                <div class="hud-title">Player</div>
                <div class="hud-time" id="p1-time">00:00.00</div>
                <div class="hud-progress" id="p1-progress">0 / 0</div>
                <div class="hud-status" id="p1-status"></div>
            </div>
            
            <div id="center-message" class="hidden">준비...</div>
            <div id="center-warning" class="hidden">발을 떼거나 너무 가까이 오지 마세요!</div>
        </div>

        <!-- Result Overlay -->
        <div id="result-overlay" class="overlay hidden">
            <h1 id="result-title">게임 종료!</h1>
            <div class="result-details" id="result-details">
                <!-- Injected via JS -->
            </div>
            <button id="restart-btn" class="action-btn">다시 하기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
